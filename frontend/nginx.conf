server {
    listen 443 ssl;
    server_name quarcnet0.tail84500c.ts.net;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate     /etc/nginx/ssl/quarcnet0.tail84500c.ts.net.crt;
    ssl_certificate_key /etc/nginx/ssl/quarcnet0.tail84500c.ts.net.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Shared login (Quarc Auth) — same account works across every Quarc app.
    # More specific than /api/ below, so nginx matches this first for auth routes.
    location /api/auth/ {
        proxy_pass http://quarc-auth:3002/api/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
    }

    location /api/ {
        proxy_pass http://backend:3003/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        client_max_body_size 30m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
